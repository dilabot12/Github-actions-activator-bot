name: Pterodactyl Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install Pterodactyl Panel
        run: |
          sudo bash <(curl -s https://pterodactyl-installer.se)
          
      - name: Keep running
        run: |
          while true; do
            echo "Panel is running - $(date)"
            sleep 300
          done
