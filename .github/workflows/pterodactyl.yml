name: Pterodactyl Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Install and Run Pterodactyl
        run: |
          # Update system
          sudo apt-get update
          
          # Install curl if not exists
          if ! command -v curl &> /dev/null; then
            sudo apt-get install -y curl
          fi
          
          # Download and run installer
          curl -sSL https://pterodactyl-installer.se > /tmp/install.sh
          sudo bash /tmp/install.sh
          
      - name: Keep Running
        run: |
          while true; do
            sleep 300
          done
