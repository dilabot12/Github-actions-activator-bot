name: Pterodactyl Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Run Pterodactyl in Docker
        run: |
          # Install Docker
          curl -fsSL https://get.docker.com | sh
          sudo usermod -aG docker $USER
          
          # Run Pterodactyl Panel
          docker run -d \
            --name pterodactyl \
            -p 80:80 \
            -p 443:443 \
            ghcr.io/pterodactyl/panel:latest
          
          # Keep running
          while true; do
            docker ps
            sleep 300
          done
