name: Pterodactyl Panel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Update package list and install curl
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Download and run installer
        run: |
          curl -sSL https://pterodactyl-installer.se -o installer.sh
          sudo bash installer.sh

      - name: Keep runner alive
        run: |
          while true; do
            echo "Panel is running - $(date)"
            sleep 300
          done
